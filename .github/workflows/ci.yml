name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
      - run: uv sync --extra dev
      - name: Ruff
        run: uvx ruff check src/ tests/
      - name: Ruff format
        run: uvx ruff format --check src/ tests/
      - name: MyPy
        run: uvx mypy --no-warn-return-any -p src

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
      - run: uv sync --extra dev
      - name: Tests
        run: uv run python -m pytest tests/ --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/fastapi/Dockerfile
          push: false
          tags: rag-platform-qwen3:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          scan-ref: rag-platform-qwen3:latest
          format: spdx
          output: sbom.spdx
