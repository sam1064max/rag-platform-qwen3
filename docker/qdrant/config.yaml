log_level: INFO

storage:
  optimizers:
    default_segment_number: 2
    memmap_threshold_kb: 20000
  performance:
    max_search_threads: 4

service:
  grpc_port: 6334
  http_port: 6333
  api_key: ${QDRANT_API_KEY:-}

collections:
  default:
    vectors:
      size: 4096
      distance: Cosine
      on_disk: true
    hnsw_config:
      m: 16
      ef_construct: 100
      full_scan_threshold: 10000
    optimizers_config:
      memmap_threshold_kb: 20000
    wal_config:
      wal_capacity_mb: 32
    quantization_config:
      scalar:
        type: int8
        always_ram: true
