codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: 90%
        threshold: 2%
    patch:
      default:
        target: 80%

comment:
  layout: "reach,diff,flags,files"
  behavior: default

ignore:
  - "tests/"
  - "docs/"
  - "docker/"
  - "scripts/"
  - "src/rag_platform_qwen3/__init__.py"
