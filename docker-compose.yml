x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck: &default-healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

networks:
  rag-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  qdrant-data:
    driver: local
  minio-data:
    driver: local
  openbao-data:
    driver: local
  openbao-config:
    driver: local
  langfuse-db:
    driver: local
  langfuse-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  otel-data:
    driver: local

services:
  # ──────────────────────────────────────────────
  # Vector Database
  # ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: rag-qdrant
    restart: unless-stopped
    networks:
      rag-network:
        ipv4_address: 172.20.0.10
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
      - ./docker/qdrant/config.yaml:/qdrant/config.yaml:ro
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY:-}"
    logging: *default-logging
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]

  # ──────────────────────────────────────────────
  # Object Storage
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-17T22-21-33Z
    container_name: rag-minio
    restart: unless-stopped
    networks:
      rag-network:
        ipv4_address: 172.20.0.11
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
      - ./docker/minio/config.sh:/config.sh:ro
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-ragadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-ragadmin123}"
      MINIO_DOMAIN: minio
    command: server /data --console-address ":9001"
    logging: *default-logging
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]

  minio-init:
    image: minio/mc:latest
    container_name: rag-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      rag-network:
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set ragminio http://minio:9000 ${MINIO_ROOT_USER:-ragadmin} ${MINIO_ROOT_PASSWORD:-ragadmin123};
      /usr/bin/mc mb ragminio/documents --ignore-existing;
      /usr/bin/mc mb ragminio/backups --ignore-existing;
      /usr/bin/mc mb ragminio/snapshots --ignore-existing;
      /usr/bin/mc policy set download ragminio/documents;
      exit 0;
      "

  # ──────────────────────────────────────────────
  # Secrets Management
  # ──────────────────────────────────────────────
  openbao:
    image: openbao/openbao:2.0.0
    container_name: rag-openbao
    restart: unless-stopped
    networks:
      rag-network:
        ipv4_address: 172.0.20.12
    ports:
      - "8200:8200"
    volumes:
      - openbao-data:/vault/data
      - openbao-config:/vault/config
      - ./docker/openbao/config.hcl:/vault/config/config.hcl:ro
    environment:
      VAULT_LOCAL_CONFIG: ""
      VAULT_ADDR: "http://0.0.0.0:8200"
      SKIP_SETCAP: "true"
    cap_add:
      - IPC_LOCK
    command: server -config=/vault/config/config.hcl
    logging: *default-logging
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8200/v1/sys/health"]

  # ──────────────────────────────────────────────
  # LLM Observability
  # ──────────────────────────────────────────────
  langfuse-db:
    image: postgres:16-alpine
    container_name: rag-langfuse-db
    restart: unless-stopped
    networks:
      rag-network:
        ipv4_address: 172.20.0.20
    volumes:
      - langfuse-db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "${LANGFUSE_DB_USER:-langfuse}"
      POSTGRES_PASSWORD: "${LANGFUSE_DB_PASSWORD:-langfuse123}"
      POSTGRES_DB: "${LANGFUSE_DB_NAME:-langfuse}"
    logging: *default-logging
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD-SHELL", "pg_isready -U langfuse"]

  langfuse:
    image: langfuse/langfuse:3.26.0
    container_name: rag-langfuse
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    networks:
      rag-network:
        ipv4_address: 172.20.0.21
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${LANGFUSE_DB_USER:-langfuse}:${LANGFUSE_DB_PASSWORD:-langfuse123}@langfuse-db:5432/${LANGFUSE_DB_NAME:-langfuse}"
      NEXTAUTH_SECRET: "${LANGFUSE_SECRET:-langfuse-secret-change-me}"
      SALT: "${LANGFUSE_SALT:-langfuse-salt-change-me}"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    logging: *default-logging
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/public/health"]

  # ──────────────────────────────────────────────
  # Metrics & Monitoring
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: rag-prometheus
    restart: unless-stopped
    networks:
      rag-network:
        ipv4_address: 172.20.0.30
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    logging: *default-logging
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/ready"]

  grafana:
    image: grafana/grafana:11.4.0
    container_name: rag-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      rag-network:
        ipv4_address: 172.20.0.31
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin123}"
      GF_INSTALL_PLUGINS: ""
    logging: *default-logging
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]

  # ──────────────────────────────────────────────
  # OpenTelemetry Collector
  # ──────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: rag-otel-collector
    restart: unless-stopped
    networks:
      rag-network:
        ipv4_address: 172.20.0.40
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    volumes:
      - otel-data:/data
      - ./docker/otel/otel-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    logging: *default-logging
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:13133"]

  # ──────────────────────────────────────────────
  # Application (placeholder - built from Dockerfile)
  # ──────────────────────────────────────────────
  rag-api:
    build:
      context: .
      dockerfile: docker/fastapi/Dockerfile
    container_name: rag-api
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      openbao:
        condition: service_healthy
    networks:
      rag-network:
        ipv4_address: 172.20.0.50
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src:ro
      - ./configs:/app/configs:ro
    environment:
      RAG_ENV: "${RAG_ENV:-production}"
      RAG_LOG_LEVEL: "${RAG_LOG_LEVEL:-info}"
      RAG_QDRANT_HOST: "qdrant"
      RAG_QDRANT_PORT: "6334"
      RAG_MINIO_HOST: "minio"
      RAG_MINIO_PORT: "9000"
      RAG_OPENBAO_ADDR: "http://openbao:8200"
      RAG_OTEL_ENDPOINT: "http://otel-collector:4317"
      RAG_LANGFUSE_HOST: "http://langfuse:3000"
    logging: *default-logging
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
